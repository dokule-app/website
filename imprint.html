<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="index, follow">
<title>Impressum — DOKULE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #2563EB;
    --bg: #FFFFFF;
    --text: #0F172A;
    --muted: #64748B;
    --border: #E2E8F0;
    --soft: #F8FAFC;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  header {
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-inner {
    max-width: 760px;
    margin: 0 auto;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .logo {
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--brand);
    text-decoration: none;
  }
  .back-link {
    font-size: 14px;
    font-weight: 500;
    color: var(--brand);
    text-decoration: none;
  }
  .back-link:hover { text-decoration: underline; }
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 24px 96px;
  }
  h1 {
    font-size: 36px;
    font-weight: 700;
    color: var(--text);
    margin: 0 0 32px;
    line-height: 1.2;
  }
  .card {
    padding: 28px 32px;
    background: var(--soft);
    border-radius: 12px;
    border-left: 3px solid var(--brand);
  }
  .card p { margin: 0 0 8px; font-size: 16px; }
  .card p:last-child { margin-bottom: 0; }
  .label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
    margin-top: 20px !important;
    margin-bottom: 4px !important;
  }
  .label:first-child { margin-top: 0 !important; }
  a {
    color: var(--brand);
    text-decoration: none;
  }
  a:hover { text-decoration: underline; }
  footer {
    border-top: 1px solid var(--border);
    padding: 32px 24px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }
  footer a { color: var(--muted); }
  @media (max-width: 600px) {
    .header-inner { padding: 16px 20px; }
    .logo { font-size: 18px; letter-spacing: 2px; }
    .back-link { font-size: 13px; }
    main { padding: 32px 20px 64px; }
    h1 { font-size: 28px; }
    .card { padding: 20px 22px; }
  }
</style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="https://dokule.com" class="logo">DOKULE</a>
      <a href="https://dokule.com" class="back-link">← Zurück zu dokule.com</a>
    </div>
  </header>
  <main>
    <h1>Impressum</h1>
    <div class="card">
      <p class="label">Anbieter</p>
      <p>Dokule</p>
      <p class="label">Inhaberin</p>
      <p>Azra Arikan</p>
      <p class="label">Anschrift</p>
      <p>Berlin, Deutschland</p>
      <p class="label">Kontakt</p>
      <p><a href="mailto:kontakt@dokule.com">kontakt@dokule.com</a></p>
    </div>
  </main>
  <footer>
    &copy; 2026 DOKULE &middot; <a href="mailto:kontakt@dokule.com">kontakt@dokule.com</a>
  </footer>
</body>
</html>
